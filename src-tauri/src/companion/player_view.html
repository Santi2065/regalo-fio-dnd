<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0e0a06" />
<title>DnD Orchestrator · Companion</title>
<style>
  *, *::before, *::after { box-sizing: border-box }
  :root {
    --bg-base:      #0e0a06;
    --bg-card:      #18130c;
    --bg-elevated:  #251c12;
    --bg-input:     #221a10;
    --border:       #322818;
    --border-soft:  #2d2218;
    --text:         #f8f1de;
    --text-soft:    #d6c391;
    --text-muted:   #998560;
    --gold:         #ecbb47;
    --gold-soft:    #c98e25;
    --success:      #6ba26a;
    --danger:       #b54848;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg-base);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }
  #app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }
  .screen { flex: 1; display: flex; flex-direction: column; padding: 20px; max-width: 480px; margin: 0 auto; width: 100%; }
  .screen-center { justify-content: center; align-items: stretch; }

  h1 { font-family: "Cinzel", Georgia, serif; color: var(--gold); margin: 0 0 8px; font-weight: 600; font-size: 22px; }
  h2 { font-size: 16px; color: var(--text); margin: 0 0 6px; }
  p { color: var(--text-soft); line-height: 1.5; margin: 6px 0; }
  .muted { color: var(--text-muted); font-size: 13px; }

  .icon-hero { font-size: 48px; text-align: center; margin-bottom: 12px; }
  .center { text-align: center; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 10px 40px -10px rgba(212, 167, 84, 0.18);
  }
  .card + .card { margin-top: 12px; }

  .input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px;
    border-radius: 8px;
    font-size: 16px;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
  }
  .input:focus { outline: 2px solid var(--gold-soft); outline-offset: 1px; border-color: var(--gold-soft); }
  .input--pin {
    text-align: center;
    font-size: 28px;
    font-family: ui-monospace, "JetBrains Mono", monospace;
    letter-spacing: 0.5em;
    padding-left: 0.5em;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    background: var(--gold-soft);
    color: var(--bg-base);
    border: none;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn--ghost {
    background: transparent;
    color: var(--text-soft);
    border: 1px solid var(--border);
  }

  .character-list { display: grid; gap: 10px; margin-top: 16px; }
  .character-card {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: left;
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 60px;
  }
  .character-card:active { background: var(--border); }
  .character-card .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--gold-soft); color: var(--bg-base);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px; flex-shrink: 0;
  }
  .character-card .arrow { margin-left: auto; color: var(--text-muted); }

  .toast {
    position: fixed;
    bottom: 16px; left: 16px; right: 16px;
    background: var(--bg-elevated);
    border: 1px solid var(--danger);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 10px;
    text-align: center;
    z-index: 100;
    animation: slide-up 200ms ease-out;
  }
  @keyframes slide-up { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: none } }

  .session-header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    backdrop-filter: blur(8px);
  }
  .session-header .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--gold-soft); color: var(--bg-base);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px;
  }
  .session-header .name { font-weight: 600; font-size: 15px; }
  .session-header .status { color: var(--text-muted); font-size: 11px; }

  .placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
    gap: 14px;
  }
  .placeholder .icon { font-size: 56px; opacity: 0.4; }

  .handouts {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .handout {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold-soft);
    border-radius: 10px;
    padding: 14px 16px;
    animation: slide-in 250ms ease-out;
  }
  .handout--new { border-color: var(--gold); border-left-color: var(--gold); }
  .handout-meta { color: var(--text-muted); font-size: 11px; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .handout-title { font-weight: 600; color: var(--text); margin-bottom: 4px; font-size: 15px; }
  .handout-body { color: var(--text-soft); font-size: 14px; line-height: 1.55; white-space: pre-wrap; word-wrap: break-word; }
  @keyframes slide-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: none; }
  }

  .ws-banner {
    background: var(--bg-elevated);
    color: var(--text-muted);
    padding: 8px 16px;
    text-align: center;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
  }
  .ws-banner--error {
    background: rgba(181, 72, 72, 0.1);
    color: var(--danger);
    border-bottom-color: var(--danger);
  }

  .roll-bar {
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    padding: 12px;
    display: flex;
    gap: 8px;
    position: sticky;
    bottom: 0;
  }
  .roll-bar input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px;
    border-radius: 8px;
    font-size: 16px;
    font-family: ui-monospace, "JetBrains Mono", monospace;
  }
  .roll-bar input:focus { outline: 2px solid var(--gold-soft); outline-offset: 1px; border-color: var(--gold-soft); }
  .roll-bar button {
    background: var(--gold-soft);
    color: var(--bg-base);
    border: none;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  .roll-bar button:disabled { opacity: 0.4; }
  .roll-result {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-left: 3px solid var(--success);
    padding: 12px 16px;
    margin: 0 16px 8px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    animation: slide-in 200ms ease-out;
  }
  .roll-result .meta { font-size: 11px; color: var(--text-muted); font-family: ui-monospace, monospace; }
  .roll-result .total { font-size: 28px; font-weight: 700; color: var(--gold); font-family: ui-monospace, monospace; }
  .roll-presets {
    display: flex;
    gap: 6px;
    padding: 0 12px 12px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .roll-presets button {
    flex-shrink: 0;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-soft);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-family: ui-monospace, monospace;
    white-space: nowrap;
    cursor: pointer;
  }
  .roll-presets button:active { background: var(--border); }

  .pulse-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.4 } }
</style>
</head>
<body>
  <div id="app"></div>

  <script>
  // ── Tiny client ──────────────────────────────────────────────────────────
  const STORAGE_KEY = "dnd-companion-token-v1";

  const state = {
    screen: "loading",
    session: null,
    characters: [],
    me: null,
    pin: "",
    selectedCharId: null,
    error: null,
    handouts: [],
    wsStatus: "disconnected", // "connected" | "disconnected" | "reconnecting"
    rollExpr: "",
    lastRoll: null, // { total, breakdown, expression, ts }
    rolling: false,
  };

  const ROLL_PRESETS = ["1d20", "1d20 adv", "1d20 dis", "1d4", "1d6", "1d8", "1d10", "1d12", "1d100"];

  let ws = null;
  let wsReconnectTimer = null;

  function render() {
    const root = document.getElementById("app");
    root.innerHTML = "";
    if (state.screen === "loading") {
      root.appendChild(renderLoading());
    } else if (state.screen === "connect") {
      root.appendChild(renderConnect());
    } else if (state.screen === "session") {
      root.appendChild(renderSession());
    }
    if (state.error) {
      const t = document.createElement("div");
      t.className = "toast";
      t.textContent = state.error;
      root.appendChild(t);
      setTimeout(() => { state.error = null; render() }, 3500);
    }
  }

  function renderLoading() {
    const div = document.createElement("div");
    div.className = "screen screen-center";
    div.innerHTML = `<div class="card center"><div class="icon-hero">⚔</div><p>Conectando...</p></div>`;
    return div;
  }

  function renderConnect() {
    const div = document.createElement("div");
    div.className = "screen screen-center";

    const card = document.createElement("div");
    card.className = "card";

    const title = state.session?.campaign_name || "Sesión D&D";
    card.innerHTML = `
      <div class="icon-hero">⚔</div>
      <h1 class="center">${escapeHtml(title)}</h1>
      <p class="center muted">Elegí tu personaje para conectarte.</p>
    `;

    if (state.session?.has_pin) {
      const pinWrap = document.createElement("div");
      pinWrap.style.marginTop = "16px";
      pinWrap.innerHTML = `<label class="muted" style="display:block;margin-bottom:6px">PIN de la sesión</label>`;
      const pinInput = document.createElement("input");
      pinInput.className = "input input--pin";
      pinInput.inputMode = "numeric";
      pinInput.maxLength = 4;
      pinInput.placeholder = "0000";
      pinInput.value = state.pin;
      pinInput.addEventListener("input", (e) => {
        state.pin = e.target.value.replace(/[^0-9]/g, "").slice(0, 4);
        e.target.value = state.pin;
      });
      pinWrap.appendChild(pinInput);
      card.appendChild(pinWrap);
    }

    const list = document.createElement("div");
    list.className = "character-list";
    if (state.characters.length === 0) {
      const empty = document.createElement("p");
      empty.className = "muted center";
      empty.style.marginTop = "16px";
      empty.textContent = "El DM aún no agregó personajes. Esperá un momento...";
      card.appendChild(empty);
    } else {
      state.characters.forEach((c) => {
        const btn = document.createElement("button");
        btn.className = "character-card";
        btn.innerHTML = `
          <span class="avatar">${escapeHtml(initials(c.name))}</span>
          <span>${escapeHtml(c.name)}</span>
          <span class="arrow">›</span>
        `;
        btn.addEventListener("click", () => connect(c.id));
        list.appendChild(btn);
      });
      card.appendChild(list);
    }

    div.appendChild(card);
    return div;
  }

  function renderSession() {
    const wrapper = document.createElement("div");
    wrapper.style.cssText = "display:flex;flex-direction:column;flex:1;width:100%;max-width:480px;margin:0 auto;";

    const header = document.createElement("div");
    header.className = "session-header";
    const wsState = state.wsStatus === "connected"
      ? '<span class="pulse-dot" style="display:inline-block;vertical-align:middle;margin-right:4px"></span> Conectado'
      : state.wsStatus === "reconnecting"
      ? '<span style="color:var(--gold)">Reconectando...</span>'
      : '<span style="color:var(--danger)">Sin conexión</span>';
    header.innerHTML = `
      <div class="avatar">${escapeHtml(initials(state.me.character.name))}</div>
      <div style="flex:1;min-width:0">
        <div class="name">${escapeHtml(state.me.character.name)}</div>
        <div class="status">${wsState}</div>
      </div>
      <button class="btn btn--ghost" style="width:auto;padding:8px 12px;font-size:13px" id="disconnect-btn">Salir</button>
    `;
    wrapper.appendChild(header);

    if (state.handouts.length === 0) {
      const placeholder = document.createElement("div");
      placeholder.className = "placeholder";
      placeholder.innerHTML = `
        <div class="icon">📨</div>
        <h2>Esperando al DM...</h2>
        <p class="muted">Cuando el DM te mande un handout o una nota privada,
           lo vas a ver acá.</p>
      `;
      wrapper.appendChild(placeholder);
    } else {
      const list = document.createElement("div");
      list.className = "handouts";
      // Más reciente arriba.
      state.handouts.slice().reverse().forEach((h, idx) => {
        const card = document.createElement("div");
        card.className = "handout" + (idx === 0 && h.isNew ? " handout--new" : "");
        const time = new Date(h.sent_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        const isPrivate = h.to_token != null;
        card.innerHTML = `
          <div class="handout-meta">
            <span>${isPrivate ? "🔒 Privado" : "📨 Para todos"}</span>
            <span>${time}</span>
          </div>
          ${h.content.title ? `<div class="handout-title">${escapeHtml(h.content.title)}</div>` : ""}
          <div class="handout-body">${escapeHtml(h.content.body)}</div>
        `;
        list.appendChild(card);
      });
      wrapper.appendChild(list);
    }

    // Last roll result (above the input).
    if (state.lastRoll) {
      const r = document.createElement("div");
      r.className = "roll-result";
      r.innerHTML = `
        <div>
          <div class="meta">${escapeHtml(state.lastRoll.expression)}</div>
          <div class="meta" style="margin-top:2px">${escapeHtml(state.lastRoll.breakdown)}</div>
        </div>
        <div class="total">${state.lastRoll.total}</div>
      `;
      wrapper.appendChild(r);
    }

    // Presets.
    const presets = document.createElement("div");
    presets.className = "roll-presets";
    ROLL_PRESETS.forEach((p) => {
      const b = document.createElement("button");
      b.textContent = p;
      b.addEventListener("click", () => {
        state.rollExpr = p;
        rollAndSend();
      });
      presets.appendChild(b);
    });
    wrapper.appendChild(presets);

    // Roll bar.
    const rollBar = document.createElement("div");
    rollBar.className = "roll-bar";
    rollBar.innerHTML = `
      <input id="roll-input" type="text" placeholder="1d20+5" value="${escapeHtml(state.rollExpr)}" inputmode="text" autocomplete="off" />
      <button id="roll-btn"${state.rolling ? " disabled" : ""}>🎲 Tirar</button>
    `;
    wrapper.appendChild(rollBar);

    setTimeout(() => {
      const b = document.getElementById("disconnect-btn");
      if (b) b.addEventListener("click", () => disconnect());
      const inp = document.getElementById("roll-input");
      const rb = document.getElementById("roll-btn");
      if (inp) {
        inp.addEventListener("input", (e) => { state.rollExpr = e.target.value; });
        inp.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            rollAndSend();
          }
        });
      }
      if (rb) rb.addEventListener("click", () => rollAndSend());
    }, 0);

    return wrapper;
  }

  function initials(name) {
    return name.split(/\s+/).filter(Boolean).slice(0, 2).map(s => s[0].toUpperCase()).join("");
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  // ── API calls ────────────────────────────────────────────────────────────
  async function bootstrap() {
    try {
      const [s, c] = await Promise.all([
        fetch("/api/session").then(r => r.json()),
        fetch("/api/characters").then(r => r.json()),
      ]);
      state.session = s;
      state.characters = c.characters || [];
    } catch (e) {
      state.error = "No se pudo cargar la sesión. ¿WiFi del DM activo?";
      render();
      return;
    }

    const token = localStorage.getItem(STORAGE_KEY);
    if (token) {
      try {
        const me = await fetch("/api/me", { headers: { Authorization: "Bearer " + token } }).then(r => {
          if (!r.ok) throw new Error("invalid");
          return r.json();
        });
        state.me = me;
        state.screen = "session";
        connectWebSocket();
        render();
        return;
      } catch {
        localStorage.removeItem(STORAGE_KEY);
      }
    }
    state.screen = "connect";
    render();
  }

  // ── WebSocket ────────────────────────────────────────────────────────────
  function connectWebSocket() {
    const token = localStorage.getItem(STORAGE_KEY);
    if (!token) return;
    if (ws) { try { ws.close(); } catch {} ws = null; }
    if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }

    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const url = `${proto}//${location.host}/ws?token=${encodeURIComponent(token)}`;
    ws = new WebSocket(url);

    ws.addEventListener("open", () => {
      state.wsStatus = "connected";
      render();
    });
    ws.addEventListener("close", () => {
      ws = null;
      if (state.screen !== "session") return;
      state.wsStatus = "reconnecting";
      render();
      wsReconnectTimer = setTimeout(connectWebSocket, 3000);
    });
    ws.addEventListener("error", () => {
      // close handler hace cleanup.
    });
    ws.addEventListener("message", (e) => {
      try {
        const evt = JSON.parse(e.data);
        handleEvent(evt);
      } catch (err) {
        console.error("[WS] bad message", err);
      }
    });
  }

  function handleEvent(evt) {
    if (evt.type === "hello") {
      // No-op por ahora.
    } else if (evt.type === "handout") {
      const h = { ...evt, isNew: true };
      state.handouts.push(h);
      try { navigator.vibrate?.(200); } catch {}
      render();
      // Quitar el highlight después de unos segundos.
      setTimeout(() => {
        const last = state.handouts[state.handouts.length - 1];
        if (last) last.isNew = false;
        if (state.screen === "session") render();
      }, 4000);
    } else if (evt.type === "kicked") {
      // El DM nos desconectó.
      localStorage.removeItem(STORAGE_KEY);
      state.me = null;
      state.handouts = [];
      state.wsStatus = "disconnected";
      state.screen = "connect";
      state.error = "El DM te desconectó";
      render();
      if (ws) { try { ws.close(); } catch {} ws = null; }
    }
  }

  async function connect(characterId) {
    state.error = null;
    state.selectedCharId = characterId;
    if (state.session?.has_pin && state.pin.length !== 4) {
      state.error = "Ingresá el PIN de 4 dígitos";
      render();
      return;
    }
    try {
      const r = await fetch("/api/connect", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ character_id: characterId, pin: state.pin || null }),
      });
      if (!r.ok) {
        const body = await r.json().catch(() => ({}));
        throw new Error(body.error || "rechazado");
      }
      const { token, character } = await r.json();
      localStorage.setItem(STORAGE_KEY, token);
      state.me = { character };
      state.screen = "session";
      state.handouts = [];
      connectWebSocket();
      render();
    } catch (e) {
      state.error = e.message === "pin_invalid" ? "PIN incorrecto" :
                    e.message === "character_taken" ? "Ese personaje ya está conectado" :
                    "No se pudo conectar (" + e.message + ")";
      render();
    }
  }

  async function rollAndSend() {
    const expr = state.rollExpr.trim();
    if (!expr || state.rolling) return;
    const token = localStorage.getItem(STORAGE_KEY);
    if (!token) return;
    state.rolling = true;
    render();
    try {
      const r = await fetch("/api/roll", {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "Authorization": "Bearer " + token,
        },
        body: JSON.stringify({ expression: expr }),
      });
      if (!r.ok) {
        const body = await r.json().catch(() => ({}));
        throw new Error(body.detail || body.error || "rechazado");
      }
      const data = await r.json();
      state.lastRoll = { ...data, ts: Date.now() };
      try { navigator.vibrate?.(80); } catch {}
    } catch (e) {
      state.error = "Tirada inválida: " + e.message;
    } finally {
      state.rolling = false;
      render();
    }
  }

  async function disconnect() {
    const token = localStorage.getItem(STORAGE_KEY);
    if (token) {
      try {
        await fetch("/api/disconnect", { method: "POST", headers: { Authorization: "Bearer " + token } });
      } catch {}
      localStorage.removeItem(STORAGE_KEY);
    }
    if (ws) { try { ws.close(); } catch {} ws = null; }
    if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
    state.me = null;
    state.handouts = [];
    state.wsStatus = "disconnected";
    state.screen = "connect";
    state.pin = "";
    render();
  }

  // Initial mount + light polling for character list updates while in connect.
  bootstrap();
  setInterval(() => {
    if (state.screen === "connect") {
      fetch("/api/characters").then(r => r.json()).then(c => {
        const next = c.characters || [];
        if (JSON.stringify(next) !== JSON.stringify(state.characters)) {
          state.characters = next;
          render();
        }
      }).catch(() => {});
    }
  }, 4000);
  </script>
</body>
</html>
