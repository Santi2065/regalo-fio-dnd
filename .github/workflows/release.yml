name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libasound2-dev
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      - name: Create .env
        shell: bash
        run: |
          echo "VITE_SPOTIFY_CLIENT_ID=${{ secrets.VITE_SPOTIFY_CLIENT_ID }}" >> .env
          echo "VITE_SPOTIFY_REDIRECT_URI=http://127.0.0.1:8888/callback" >> .env

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DnD Orchestrator ${{ github.ref_name }}"
          releaseBody: |
            ## Instalación

            **Windows:** descargá `DnD Orchestrator_*_x64-setup.exe` y ejecutalo.
            **Linux (Debian/Ubuntu):** `sudo dpkg -i "DnD Orchestrator_*_amd64.deb"`

            ### Requisitos
            - **Windows:** Windows 10 o superior (WebView2 se instala automáticamente si no está)
            - **Linux:** GTK 4 + WebKit2GTK

            ### Spotify
            La primera vez conectá tu cuenta desde la pestaña 🎵 dentro de la app.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
